spring.application.name=grampanchayat
# Server
#server.port=8087

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.mvc.view.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/grampanchayat
spring.datasource.username=root
spring.datasource.password=1998
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#logging.level.com.zaxxer.hikari=DEBUG
#logging.level.org.hibernate.SQL=DEBUG


# Security (for dev)
spring.security.user.name=admin
spring.security.user.password=admin123


sms.api.key=YOUR_FAST2SMS_API_KEY

whatsapp.api.url = https://graph.facebook.com/v18.0
whatsapp.token =whatsapp.token
whatsapp.phone.id = whatsapp.phone.id
