current_schemes_name_card1=Pradhan Mantri Awas Yojana - Urban 2.0
current_schemes_link_card1 = <a href="https://pmaymis.gov.in/PMAYMIS2_2024/PmayDefault.aspx" target="_blank">https://pmaymis.gov.in/PMAYMIS2_2024/PmayDefault.aspx </a>
current_schemes_text_card1 = <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility Criteria</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Family definition: Husband, wife, and unmarried children (beneficiaries).</li> <li>Ownership: The applicant should not own a pucca house anywhere in India.</li> <li>Income group:<br/> EWS: Annual income up to ₹3 lakh.<br/> LIG: Annual income between ₹3 lakh to ₹6 lakh.</li> <li>Property location: Statutory towns as per Census 2011.</li> <li>Area: Carpet area of the house should be less than 120 sq. meters.</li> </ul> </td> <td> <ul> <li>Aadhaar Card (applicant and family members).</li> <li>Identity proof: PAN Card, Passport, or Voter ID.</li> <li>Address proof: Electricity bill, Ration Card, or Bank Passbook.</li> <li>Income proof:<br/> Salaried: Salary slips (last 2 months).<br/> Self-employed: ITR (Income Tax Returns).</li> <li>Bank statement: Last 6 months.</li> <li>Property documents: If constructing on own land, land ownership documents.</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 2 =====================
current_schemes_name_card2=Gram Panchayat Awas Yojana
current_schemes_link_card2 = <a href="https://rdd.maharashtra.gov.in/en/" target="_blank">https://rdd.maharashtra.gov.in/en/</a>
current_schemes_text_card2 =<div class="table-container"> <table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Resident: The applicant must be a permanent resident of rural Maharashtra.</li> <li>House: The family should not own a pucca house anywhere in India (kutcha house or homeless).</li> <li>Income: Must belong to Economically Weaker Section (EWS - up to ₹3 lakh annually) or Low Income Group (LIG - up to ₹6 lakh annually).</li> <li>Selection: Name must be included in SECC-2011 (Socio-Economic and Caste Census) database.</li> <li>Priority: BPL (Below Poverty Line) families are given priority.</li> </ul> </td> <td> <ul> <li>Aadhaar Card (applicant and spouse).</li> <li>Ration Card.</li> <li>Caste Certificate (if belonging to SC/ST or minority category).</li> <li>7/12 extract or property registration documents (proof of land ownership).</li> <li>Gram Panchayat property register extract.</li> <li>Income Certificate (issued by competent authority).</li> <li>Bank passbook (Aadhaar linked).</li> <li>MGNREGA Job Card (if available).</li> <li>Passport size photograph.</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 3 =====================
current_schemes_name_card3=Ayushman Bharat (Health Insurance)
current_schemes_link_card3 =<a href="https://beneficiary.nha.gov.in/" target="_blank"> https://beneficiary.nha.gov.in/</a>
current_schemes_text_card3 = Ayushman Bharat - Pradhan Mantri Jan Arogya Yojana (AB-PMJAY) is a government scheme that provides free (cashless) treatment up to ₹5 lakh per year to economically weaker families. People from rural areas such as landless laborers, kutcha house residents, and identified poor families in urban areas are eligible under this scheme, as per SECC 2011 data. <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Key Eligibility</th> <th>Required Documents & Benefits</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Rural: Families living in kutcha houses, landless laborers, or SC/ST households.</li> <li>Urban: Homeless, beggars, domestic workers, sanitation workers, street vendors, artisans, etc.</li> <li>Age: All senior citizens above 70 years are eligible for separate coverage without income criteria.</li> </ul> </td> current_schemes_document_card3 = </td> <td> <ul> <li>Aadhaar Card: For all family members.</li> <li>Ration Card: For family identification.</li> <li>Income Certificate: (BPL certificate).</li> <li>Caste Certificate: (if applicable).</li> <li>Mobile Number: For registration.</li> <li>Free treatment up to ₹5 lakh: Cashless facility in government and empaneled private hospitals across India.</li> <li>Covered diseases: Heart diseases, cancer, kidney disorders, COVID-19, and other major illnesses (including surgeries).</li> <li>Family cover: No limit on number of members or age.</li> </ul> </td> </tr> </tbody> </table></div>
# ===================== SCHEME 4 =====================
current_schemes_name_card4=Education Assistance Scheme
current_schemes_link_card4 = <a href="https://education.maharashtra.gov.in/" target="_blank">https://education.maharashtra.gov.in/</a>
current_schemes_text_card4 = <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility Criteria</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <b>Target Group:</b><br/> Registered workers (construction laborers), widows of workers, or economically weaker students. <br/><b>Educational Qualification:</b> <ul> <li>Students should have secured at least 50–60% marks in their previous class/exam (e.g., 10th or 12th).</li> <li>Institution Type:<br/> The student must be admitted to a government-recognized or authorized educational institution.</li> <li>Income Criteria:<br/> The family’s annual income limit is defined (varies by state, generally between ₹4.5 lakh to ₹8 lakh).</li> <li>Registration Requirement:<br/> Workers must be registered with the respective State Building and Other Construction Workers Welfare Board (usually minimum 1 year registration required).</li> <li>Family Limit:<br/> Benefits are generally limited to a maximum of two children per family.</li> </ul> </td> current_schemes_document_card4 = </td> <td> <ul> <li>Documents required while applying for the Education Assistance Scheme:</li> <li>Aadhaar Card of student and parents</li> <li>Labor Registration Card of parent (original/copy)</li> <li>Marksheet of last passed examination (10th, 12th, etc.)</li> <li>Bonafide Certificate from current educational institution<br/> Bank Passbook (Aadhaar-linked account)</li> <li>Income Certificate (if required)</li> <li>Fee receipt / fee structure of current course</li> <li>Self-declaration / affidavit regarding number of children and income<br/> Passport size photograph</li> <li>Death Certificate of worker (if applying under special assistance for deceased construction worker)</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 5 =====================
current_schemes_name_card5=Indira Gandhi Old Age Pension
current_schemes_link_card5 = <a href="https://sjsa.maharashtra.gov.in/en/scheme/indira-gandhi-national-old-age-pension-scheme/" target="_blank">https://sjsa.maharashtra.gov.in/en/scheme/indira-gandhi-national-old-age-pension-scheme/</a>
current_schemes_text_card5 = Indira Gandhi National Old Age Pension Scheme (IGNOAPS) provides financial assistance to senior citizens aged 60 years or above who belong to Below Poverty Line (BPL) families. Under this scheme, individuals aged 60–79 years receive ₹200 per month, and those aged 80 years and above receive ₹500 per month from the Central Government. In Maharashtra, eligible beneficiaries can receive an additional amount under the "Shravanbal Seva State Pension Scheme", making the total pension up to ₹1,500. <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>The applicant must be an Indian citizen.</li> <li>Age should be 60 years or above.</li> <li>The applicant must belong to a BPL (Below Poverty Line) family.</li> <li>The applicant should not have a stable source of income.</li> </ul> </td> current_schemes_document_card5 = </td> <td> <ul> <li>Aadhaar Card</li> <li>Age proof (e.g., Birth Certificate, School Leaving Certificate)</li> <li>BPL Ration Card or certificate</li> <li>Address proof (Ration Card, Electricity Bill, Voter ID)</li> <li>Bank or Post Office passbook copy</li> <li>Passport size photographs</li> <li>Signed application form</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 6 =====================
current_schemes_name_card6=Old Age Assistance Scheme
current_schemes_link_card6 = <a href="https://marathiyojanalay.com/maharashtra-senior-citizen-yojana-2025-pension-benefits-apply-online/" target="_blank">https://marathiyojanalay.com/maharashtra-senior-citizen-yojana-2025-pension-benefits-apply-online/</a>
current_schemes_text_card6 = In Maharashtra, the major government schemes for senior citizens include the Indira Gandhi National Old Age Pension Scheme and the Shravanbal Seva State Pension Scheme. To be eligible, the applicant must be 65 years or above (in some cases 60+), belong to the Below Poverty Line (BPL) category, and be a resident of Maharashtra. Under these schemes, financial assistance ranging from ₹600 to ₹1,500 per month is directly transferred to the bank account (DBT).<div class="table-container"> <table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility Criteria</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Age: The applicant must be 65 years or above.</li> <li>Income: Must belong to the BPL (Below Poverty Line) category.</li> <li>Residence: Must be a resident of Maharashtra State.</li> <li>Family Status: There should be no earning member in the family, or in case of women, the husband has deserted her.</li> <li>Shravanbal Scheme: Those with annual income less than ₹21,000 are also eligible.</li> </ul> </td> current_schemes_document_card6 = </td> <td> <ul> <li>Application form (prescribed format).</li> <li>Aadhaar Card (identity proof).</li> <li>Age proof: Birth Certificate, School Leaving Certificate, or age certificate certified by Tehsildar.</li> <li>Residence proof: Aadhaar Card, Voter ID, or Ration Card.</li> <li>BPL Certificate.</li> <li>Bank account: Copy of bank passbook (Aadhaar-linked account).</li> <li>Passport size photograph.</li> <li>Income certificate issued by Tehsildar (if required).</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 7 =====================
current_schemes_name_card7=PM-KISAN
current_schemes_link_card7 =<a href="https://pmkisan.gov.in/" target="_blank"> https://pmkisan.gov.in/</a>
current_schemes_text_card7 = Under the Pradhan Mantri Kisan Samman Nidhi (PM-KISAN) scheme, eligible farmer families receive financial assistance of ₹6,000 per year directly into their bank accounts (in three installments of ₹2,000 every four months). <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility</th> <th>Required Documents</th> <th>How to Register?</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Landholding Farmers: Farmers who own cultivable land are eligible.</li> <li>Land Limit: Earlier limited to 2 hectares, but now removed; all small and marginal farmers are eligible.</li> <li>Family Definition: Husband, wife, and minor children are considered one family.</li> <li>Aadhaar Linking: Bank account must be linked with Aadhaar.</li> <li>eKYC: Completion of eKYC is mandatory for beneficiaries.</li> </ul> </td> current_schemes_document_card7 = </td> <td> <ul> <li>Aadhaar Card: Most important document.</li> <li>Land Holding Documents: 7/12 extract and 8A certificate.</li> <li>Bank Passbook: With account number and IFSC code.</li> <li>Identity Proof: Voter ID or PAN Card.</li> <li>Mobile Number: Aadhaar-linked mobile number.</li> <li>Ration Card.</li> </ul> </td> <td> <ul> <li>Online: Visit the official PM-KISAN portal (pmkisan.gov.in) and register via "New Farmer Registration".</li> <li>Offline: Apply through the nearest Common Service Center (CSC).</li> <li>Update: A Farmer ID linked with Aadhaar will be mandatory for future benefits, including distribution of seeds and fertilizers.</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 8 =====================
current_schemes_name_card8=Agriculture Support Scheme
current_schemes_link_card8 = <a href="https://agriwelfare.gov.in/" target="_blank">https://agriwelfare.gov.in/</a>
current_schemes_text_card8 = In Maharashtra, under Agriculture Support Schemes (e.g., MahaDBT), farmers receive subsidies on seeds, machinery, and irrigation equipment. To be eligible, the farmer must be a resident of Maharashtra and must have a 7/12 land record and a bank account. Applications are submitted through the "MahaDBT" portal on a first-come, first-served basis.<div class="table-container"> <table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Agriculture Scheme Eligibility</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>The applicant must be a resident of Maharashtra State.</li> <li>The farmer must own agricultural land in their name.</li> <li>Small, marginal, women, and SC/ST farmers are given special priority.</li> <li>Only one person per family can avail benefit for a particular component.</li> </ul> </td> current_schemes_document_card8 = </td> <td> <ul> <li>Aadhaar Card (must be linked with bank account).</li> <li>7/12 extract and 8A extract (or current crop/fertilizer receipt).</li> <li>Bank passbook copy (with IFSC code).</li> <li>Caste Certificate (for SC/ST category).</li> <li>Passport size photograph.</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 9 =====================
current_schemes_name_card9=Sukanya Samriddhi Yojana
current_schemes_link_card9 = <a href="https://www.sukanyasamriddhiyojana.org/about/" target="_blank">https://www.sukanyasamriddhiyojana.org/about/</a>
current_schemes_text_card9 = Sukanya Samriddhi Yojana (SSY) is a savings scheme by the Government of India for the education and marriage of girl children. Parents can open an account for a girl below 10 years of age. A minimum of ₹250 and a maximum of ₹1.5 lakh can be invested annually. The account matures after 21 years. This account can be opened at a nearby Post Office or authorized bank. <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Eligibility</th> <th>Required Documents</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Age Limit: The girl child must be below 10 years of age.</li> <li>Citizenship: The girl must be an Indian citizen.</li> <li>Number of Accounts: Only one account per girl child is allowed. A parent can open accounts for up to two girls (in some cases, three).</li> </ul> </td> current_schemes_document_card9 = </td> <td> <ul> <li>Birth Certificate of the girl child (original and copy).</li> <li>Aadhaar Card of parents (identity and address proof).</li> <li>PAN Card of parents.</li> <li>Photographs of the girl child and parents.</li> <li>Application Form for opening SSY account.</li> </ul> </td> </tr> </tbody> </table></div>

# ===================== SCHEME 10 =====================
current_schemes_name_card10=Women Self-Employment Scheme
current_schemes_link_card10 =<a href=" https://www.myscheme.gov.in/hi/schemes/wses" target="_blank"> https://www.myscheme.gov.in/hi/schemes/wses</a>
current_schemes_text_card10 = The Maharashtra Government implements various women self-employment schemes (e.g., Mahajyoti, Annasaheb Patil Corporation, Zilla Parishad schemes) for women empowerment. Under these schemes, women can receive collateral-free loans up to ₹10 lakh, subsidies, and training for businesses such as beauty parlors, tailoring, etc. Eligibility includes age between 18–60 years, Maharashtra domicile certificate, and belonging to BPL or low-income group. <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>Women Self-Employment Scheme Eligibility</th> <th>Benefits / Required Documents</th> <th>How to Apply?</th> </tr> </thead> <tbody> <tr style="vertical-align: top;"> <td> <ul> <li>Resident: Applicant must be a resident of Maharashtra.</li> <li>Age: Between 18 to 60 years.</li> <li>Income: Women from BPL or middle/low-income group.</li> <li>Priority: SC/ST and backward category women are given preference.</li> <li>Self-help Group: Membership may be required for some schemes; individual loan schemes are also available.</li> </ul> </td> current_schemes_document_card10 = </td> <td> <ul> <li>Main schemes and benefits:</li> <li>Mahila Swayamsiddhi Yojana: Loan up to ₹10 lakh.</li> <li>Zilla Parishad Self-Employment Scheme: 100% subsidy support for tools like sewing machines, flour mills, chili processing units, etc.</li> <li>Women Entrepreneurship & Skill Development Program: Micro-loans up to ₹2 lakh with training.</li> </ul> </td> <td> <ul> <li>Apply by visiting Zilla Parishad, Women & Child Development Department, or nearby Annasaheb Patil Corporation office.</li> <li>You can apply for loans up to ₹10 lakh under Mahila Swayamsiddhi scheme.</li> <li>Aadhaar Card</li> <li>Domicile Certificate of Maharashtra</li> <li>Income Certificate (issued by Tehsildar)</li> <li>Bank passbook copy (Aadhaar-linked account)</li> <li>Ration Card</li> <li>Passport size photographs</li> <li>Caste Certificate (if applicable)</li> <li>Business Plan / Project Report (for loan applications)</li> </ul> </td> </tr> </tbody> </table></div>


