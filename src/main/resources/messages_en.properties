health_department.introduction = Deulgaon Gada Gram Panchayat – Health Profile
health_department.para1 = Overview of Health Services. </br>Deulgaon Gada Gram Panchayat ensures the delivery of basic and preventive health services to its residents. The Gram Panchayat coordinates with the Public Health Department to provide the following services:
health_department.para2 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> Primary healthcare services through Primary Health Centres (PHC) and Health Sub-Centres </td></tr><tr><td> 2 </td><td> Immunization and Maternal and Child Health programs </td></tr><tr><td> 3 </td><td> Disease prevention and health awareness campaigns </td></tr><tr><td> 4 </td><td> Health check-ups for school students and senior citizens </td></tr></tbody></table></div>
health_department.para3 = <b>Health Infrastructure</b><div class="table-container"><table class="custom-table"> <thead> <tr> <th> Facility Type</th><th> Number in Gram Panchayat / Nearby Area </th></tr> </thead><tbody> <tr> <td> Primary Health Centre (PHC)</td><td> 1 (for approx. 30,000 population)</td></tr><tr><td> Health Sub-Centre</td><td> 1 (for approx. 5,000 population)</td></tr><tr><td> Community Health Programs</td><td> Immunization drives, maternal and child health services</td></tr><tr><td> Mobile/Outreach Services</td><td> Regular health camps and check-ups</td></tr></tbody> </table></div><br/>Note: PHC and Sub-Centre provide outpatient treatment, preventive care, minor procedures, health awareness programs, and referral services to district hospitals when required.
health_department.para4 = Major Health Programs
health_department.para5 = Deulgaon Gada Gram Panchayat actively participates in state and national health programs:
health_department.para6 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> National Rural Health Mission (NRHM) – Improvement of rural healthcare facilities </td></tr><tr><td> 2 </td><td> Janani Suraksha Yojana (JSY) – Promotion of institutional deliveries </td></tr><tr><td> 3 </td><td> National Immunization Program – Vaccination for children and pregnant women </td></tr><tr><td> 4 </td><td> National Tuberculosis Control Program – TB prevention and treatment </td></tr><tr><td> 5 </td><td> National Leprosy Eradication Program – Diagnosis and treatment of leprosy </td></tr><tr><td> 6 </td><td> National Vector Borne Disease Control Program – Control of dengue, malaria, etc. </td></tr><tr><td> 7 </td><td> National Iodine Deficiency Disorders Control Program – Goiter prevention </td></tr><tr><td> 8 </td><td> National AIDS Control Program – HIV/AIDS awareness, testing, and counseling </td></tr><tr><td> 9 </td><td> School Health Program – Regular health check-ups for students </td></tr></tbody></table></div>
health_department.para7 = Maternal & Child Health
health_department.para8 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> Regular antenatal and postnatal care for pregnant women </td></tr><tr><td> 2 </td><td> Promotion of safe deliveries and support for safe home deliveries </td></tr><tr><td> 3 </td><td> Immunization and growth monitoring for children under 5 years </td></tr><tr><td> 4 </td><td> Nutrition and anemia prevention programs</td></tr></tbody></table></div>
health_department.para9 = Sanitation & Cleanliness Campaigns
health_department.para10 =<div class="table-container"> <table class="custom-table"> <tbody> <tr><td> 1 </td><td> Safe drinking water supply through household connections or public taps </td></tr><tr><td> 2 </td><td> Public sanitation awareness under Swachh Bharat Mission </td></tr><tr><td> 3 </td><td> Solid waste management and village cleanliness drives </td></tr><tr><td> 4 </td><td> Promotion of proper drainage, toilets, and sanitation education </td></tr></tbody></table></div>
health_department.para11 = Public Health Surveillance
health_department.para12 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> Health records and patient data maintained at PHC and Sub-Centre </td></tr><tr><td> 2 </td><td> Preventive measures against disease outbreaks and epidemics </td></tr><tr><td> 3 </td><td> Monsoon precautions to prevent gastro, malaria, and water-borne diseases </td></tr><tr><td> 4 </td><td> Awareness on common diseases: diarrhea, dengue, malaria, seasonal infections </td></tr></tbody></table></div>
health_department.para13 = Collaboration
health_department.para14 = The Gram Panchayat coordinates with:
health_department.para15 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> District Health Office, Pune </td></tr><tr><td> 2 </td><td> Zilla Parishad Health Department </td></tr><tr><td> 3 </td><td> NGOs – Health awareness and immunization drives </td></tr><tr><td> 4 </td><td> School Health Programs – Child health screening </td></tr></tbody></table></div>
health_department.para16 = Conclusion
health_department.para17 = Deulgaon Gada Gram Panchayat is committed to the health and well-being of its citizens:
health_department.para18 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> Strengthening primary healthcare services </td></tr><tr><td> 2 </td><td> Implementing national and state health programs </td></tr><tr><td> 3 </td><td> Conducting health awareness and preventive initiatives </td></tr><tr><td> 4 </td><td> Promoting sanitation, safe water, and environmental health </td></tr></tbody></table></div>
health_department.para19 = The Gram Panchayat works with the Public Health Department to provide quality healthcare services to women, children, senior citizens, and vulnerable groups.
