aboutus.vision_title =The Vision of the Gram Panchayat includes:
aboutus.vision_details = The Deulgaon Gada Gram Panchayat is a democratic local self-government institution working towards the holistic, balanced, and sustainable development of the village. The vision of the Gram Panchayat is centered on ensuring that every citizen has access to basic amenities, social justice, economic opportunities, and a dignified quality of life.
aboutus.vision_details_ponits = <ol class="vision-list"><li><strong>Holistic Village Development</strong><br><p> The Deulgaon Gada Gram Panchayat aims to effectively provide basic facilities such as education, healthcare, drinking water supply, sanitation, roads, electricity, water conservation, and housing. Strengthening village infrastructure and improving the overall standard of living of citizens is a primary objective.</p> </li><li><strong>Development of Agriculture and the Rural Economy</strong><br><p> The Gram Panchayat emphasizes strengthening the village economy by promoting agriculture, irrigation, animal husbandry, dairy farming, self-employment, and rural industries. Efforts are made to generate employment through the optimal use of local resources.</p> </li><li><strong>Inclusive and Social Justice–Based Development</strong><br><p> Bringing Scheduled Castes, Scheduled Tribes, women, senior citizens, persons with disabilities, and other marginalized sections into the mainstream of development is a key vision of the Gram Panchayat. Continuous efforts are made to ensure equal opportunities and social justice for all.</p> </li><li><strong>Clean and Healthy Village</strong><br><p> The Deulgaon Gada Gram Panchayat is committed to creating a clean, beautiful, and healthy village. Special focus is given to sanitation, solid waste management, safe drinking water supply, and health awareness programs.</p> </li><li><strong>Public Participation and Transparency</strong><br><p> Maintaining transparency in decision-making through Gram Sabha and public participation, understanding citizens’ needs and suggestions, and providing accountable governance form an important part of the Gram Panchayat’s vision.</p> </li><li><strong>Sustainable and Environment-Friendly Development</strong><br><p> The Gram Panchayat believes in achieving sustainable development for future generations through environmental protection, water conservation, tree plantation, and conservation of natural resources. </p></li></ol>

aboutus.mission_title = Key Missions of the Gram Panchayat:
aboutus.mission_details = The mission of the Deulgaon Gada Gram Panchayat is to achieve holistic, inclusive, transparent, and sustainable development with the active participation of all citizens. Through the local self-government system, the Gram Panchayat strives to enhance the quality of rural life by delivering effective and timely services.
aboutus.mission_details_ponits =<ol class="vision-list"><li><strong>Development of Rural Infrastructure</strong><br><p> To improve the availability and quality of drinking water, sanitation, roads, electricity, street lighting, drainage systems, and other civic amenities to support physical development of the village. </p></li><li><strong>Promotion and Improvement of Education</strong><br><p> To ensure access to education for all children, improve school infrastructure, bring out-of-school children into the education system, and encourage academic progress. </p></li><li><strong> Strengthening Health and Sanitation Services</strong><br><p> To promote health awareness, conduct cleanliness drives, maintain drinking water quality, and ensure effective implementation of government health schemes. </p></li><li><strong> Promotion of Agriculture, Animal Husbandry, and Self-Employment</strong><br><p> To guide farmers, improve water management, promote animal husbandry and dairy activities, and strengthen women self-help groups and self-employment initiatives. </p></li><li><strong> Empowerment of Marginalized Sections</strong><br><p> To effectively implement special schemes for women, Scheduled Castes, Scheduled Tribes, senior citizens, persons with disabilities, and economically weaker sections to achieve social and economic empowerment. </p></li><li><strong> Strengthening Public Participation and Democracy</strong><br><p> To increase active citizen participation through Gram Sabha meetings, community programs, and discussions, while ensuring transparency and accountability in governance. </p></li><li><strong> Environmental Protection and Sustainable Development</strong><br><p> To promote water conservation, tree plantation, clean energy, and environment-friendly initiatives for sustainable village development. </p></li><li><strong> Transparent and Effective Administration</strong><br><p> To ensure transparency in Gram Panchayat functioning, timely service delivery, rule-based decision-making, and accountable administration.</p></li></ol>


aboutus.introduction = 📄 <b>Deulgaon Gada – Introduction</b>
aboutus.para1 =  <p>Located in Daund taluka of Pune district, Deulgaon Gada is not just a village — it is an inspiring story of transformation, determination, and progress.</p><p>Situated approximately 60–64 km from Pune and around 30 km from Daund, this village has a population of about 3,051 (Census 2011) and serves as an important rural center.<br/>Spread across nearly 2,470 hectares, Deulgaon Gada is steadily progressing towards development through its Gram Panchayat.</p>
aboutus.para2 = 🌍 <b>Geographical and Cultural Identity</b><p>Deulgaon Gada is located near the villages of Chaufula, Khor, and Padvi, forming a strong rural network in the region.</p><p>The proximity to the :contentReference[oaicite:0]{index=0} gives the area ecological and environmental importance.</p><p>Additionally, Narayan Maharaj Bet (Kedgaon) is a significant religious site in the region and a place of deep faith for devotees.</p>
aboutus.para3 = 🎓 <b>Progress Through Education</b><p>The strong foundation of development in Deulgaon Gada is education. The village offers good facilities from primary to higher secondary education.</p><ul>Main schools in the village:<li>Shri Sadguru Vidyalaya</li><li>Shri Sadguru Secondary and Higher Secondary School</li><li>Zilla Parishad Primary School (Gaothan)</li><li>Zilla Parishad Primary School (Vitthalwadi)</li><li>Zilla Parishad Primary School (Baravkarwadi)</li><li>Deep Gruh English School, Deulgaon Gada</li><li>Shiva Valley School</li></ul><p>With a literacy rate of around 78%, the village is consistently progressing in education. Many students pursue higher education in Daund, Baramati, and Pune.</p>
aboutus.para4 = 🌾 <b>From Traditional Farming to Modern Technology</b><p>Agriculture is the backbone of the village, and farmers are now adopting modern farming techniques, improved irrigation, and diverse cropping patterns.</p><p>This has increased productivity, improved economic stability, and strengthened the agricultural sector of the village.</p>
aboutus.para5 = 🏭 <b>Growth of Industries and Employment</b><p>Deulgaon Gada is no longer limited to agriculture. Growing industries in and around the village have created new employment opportunities:</p><ul><li>Varsha Agro Food Processing Cluster</li><li>Bhuleshwar Seamless Pvt. Ltd.</li><li>JVS Comatsco Industries Pvt. Ltd.</li><li>Gaj Lakshmi Castings Pvt. Ltd. – Foundry Unit</li><li>Crescent Fuses Pvt. Ltd.</li></ul>In addition, the traditional brick kiln business continues to support the local economy.</p>
aboutus.para6 = 👨‍🎓 <b>Youth – Architects of Change</b><p>The youth of Deulgaon Gada are the true drivers of the village’s progress:</p><ul><li>Many are working in private sectors in Pune and industrial areas</li><li>Some are serving in police, military, and government sectors, while others are moving towards entrepreneurship and business</li></ul><p>This changing direction is leading the village towards new opportunities and modernization.</p>
aboutus.para7 = 🏡 <b>Moving Towards Progress</b><p>With a strong Gram Panchayat, increasing education, growing industries, and progressive youth, Deulgaon Gada is rapidly moving towards modern development while preserving its traditions.</p>

#history page
history.page_header = Historical and spiritual heritage
history.narayan_bet_datta_temple_name= Narayan Bet Dattatray Temple
history.narayan_bet_datta_temple_address = Kedgaon, Tal. Daund, Dist. Pune
history.narayan_bet_datta_temple_para1 = <p>The Datta Temple built by Sadguru Narayan Maharaj Kedgaonkar on Narayan Bet (island) at Kedgaon in Daund taluka is a place of faith for millions of devotees in the state. The specialty of this temple is the golden idol of Shri Datta, weighing about three and a half kilograms, adorned with diamonds and rubies. Every year, on the Thursday before Datta Jayanti in the month of Margashirsha, this idol is available for the darshan of devotees. At that time, thousands of devotees visit Narayan Bet to take darshan of Shri Datta.</p> 
history.narayan_bet_datta_temple_para2 = <p>According to the description in the book 'Shri Narayan Leelamrut', Sant Narayan Maharaj, born in 1885 in Karnataka, was a realized person and an incarnation of Dattatreya. At the age of two, he lost his father, and at the age of five, his mother. From childhood, he was inclined towards God. He used to sit in meditation continuously in the Venkatesh temple near his house. He left home at the age of nine and, while wandering, came to Gangapur between 1900 and 1901. It is said that Shri Datta himself appeared there and gave him initiation. After that, he resided in Arvi and Supe between 1902 and 1904.</p> 
history.narayan_bet_datta_temple_para3 = <p>He arrived in Daund in 1905. After that, he started searching for a place for the temple of his Guru, Shri Datta. He selected the place where Narayan Bet is currently located for the temple and, buying this island-like place surrounded by a stream on all four sides, he built the Guru Mandir on it. This is today's Narayan Bet Datta Temple.</p> 
history.narayan_bet_datta_temple_para4 = <p>Initially, a structure was built on this island for religious programs like bhajans and kirtans. After that, the construction of the Shri Datta Temple was carried out in 1913. At that time, Vasanji Shet gave the diamond-studded gold idol weighing three and a half kilograms for this temple. Initially, this very idol was installed in the Datta Temple; however, in the later period, a new idol was installed there. For security reasons, the golden idol here is kept in a bank locker throughout the year and is available for darshan to devotees for one day in the year.</p> 
history.narayan_bet_datta_temple_para5 = <p>In 1930, Maharaj performed the first Atirudra Anushthan in front of the gold idol of Shri Datta installed in the temple. In the same year, the ceremony of 108 Satyanarayan Pujas took place. In 1933, Maharaj conducted a ceremony of 1108 Satyanarayan Mahapujas simultaneously at this place. In addition, in March 1936, day and night Satyanarayan Pujas were held at the rate of 108 per hour for one week. After that, in 1937, Maharaj went on a pilgrimage and returned to the island in 1943. In 1944, Maharaj performed the Mahamrityunjaya Anushthan on this island. In 1945, he left Narayan Bet and went to Bangalore and never returned to Narayan Bet. There, on Shravan Vadya Dwadashi, September 3, 1945, the Atirudra Swahakar Anushthan took place, and at 5 PM, Sadguru Narayan Maharaj merged into the feet of Datta. From there, his ashes were brought and placed at the Samadhi place of Maharaj in Narayan Bet.</p> 
history.narayan_bet_datta_temple_para6 = <p>The Shri Datta Temple and the Samadhi place of Maharaj are located in an area of about 11 acres. The Datta Temple here is east-facing, and on the left pillar at the entrance of the temple are idols of Atri Rishi and on the right pillar of Sati Anusuya. The assembly hall (Sabhamandap) here is of the Ardhamandap type. It has eight pillars, and on the four pillars on the right side are the idols of Matsya, Kurma, Varaha, and Narasimha, while on the pillars on the left side are unique idols of Vamana, Parshuram, Shriram, and Shrikrishna. In addition, there is a beautiful idol where Sheshshayi Shri Narayan is reclining, Lord Brahma is created from his navel lotus, and Mother Laxmi is serving Narayan.</p> 
history.narayan_bet_datta_temple_para7 = <p>On the circumambulation path (Pradakshina marg), there are idols of Ram Panchayatana, south-facing Hanuman, north-facing Kuber, Dharma, Bhim, Arjun, Nakul, and Sahadev. At the entrance of the sanctum sanctorum (Garbhagriha) are idols of Rama-Madhav, as well as Jay-Vijay. In addition, Varadalaxmi is standing with elephants, holding an Amritkalash in her hand. Hanuman to the north and Mahaganapati to the south are facing each other. Outside the sanctum sanctorum on the circumambulation path are idols of Yam to the south, Varun to the west, and Kuber to the north. The spire (Shikhar) of the temple is about 80 feet high. On the flagstaff of the spire, there are images of the Sun and Moon in the east and west directions.</p> 
history.narayan_bet_datta_temple_para8 = <p>According to the rules laid down by Narayan Maharaj, daily puja rituals are still performed here today. The bell rings at 5 AM, followed by Panchamrit Puja, Rudrabhishek on the padukas (footprints) of the Lord, and Trikal Puja. Every Thursday at 8 PM, a procession of the Lord is taken out in a palanquin. Accommodation facilities are also available for devotees coming here.</p> 

