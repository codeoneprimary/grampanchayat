history.page_header = ऐतिहासिक व आध्यात्मिक वारसा
history.narayan_bet_datta_temple_name = नारायण बेट दत्त मंदिर 
history.narayan_bet_datta_temple_address = केडगाव, ता. दौंड, जि. पुणे
history.narayan_bet_datta_temple_para1 = <p>सद्‌गुरू नारायण महाराज केडगावकर यांनी दौंड तालुक्यातील केडगाव येथे नारायण बेटावर बांधलेले दत्त मंदिर राज्यातील लाखो भाविकांचे श्रद्धास्थान आहे. या मंदिराचे वैशिष्ट्य म्हणजे तेथील तब्बल साडेतीन किलो वजनाची हिरे व माणिक लावलेली श्रीदत्तांची सुवर्ण मूर्ती. दरवर्षी मार्गशीर्ष महिन्यात दत्त जयंतीच्या आधी येणाऱ्या गुरुवारी ही मूर्ती भक्तांच्या दर्शनास उपलब्ध असते. त्यावेळी श्रीदत्तांचे दर्शन घेण्यासाठी हजारो भाविकांची या नारायण बेटावर उपस्थिती असते.</p>
history.narayan_bet_datta_temple_para2 = <p>श्री नारायण लीलामृत या ग्रंथातील वर्णनानुसार, कर्नाटकात १८८५ साली जन्म झालेले संत नारायण महाराज हे दत्तावतारी सिद्ध पुरुष होते. वयाच्या दुसऱ्या वर्षी वडील व पाचव्या वर्षी त्यांचे मातृछत्र काळाने हिरावून घेतले होते. लहानपणापासूनच त्यांना परमेश्वराचा ओढा होता. घराजवळ असलेल्या व्यंकटेशाच्या मंदिरात ते सतत ध्यान लावून बसत असत. वयाच्या नवव्या वर्षी त्यांनी गृहत्याग केला व भ्रमंती करीत ते १९०० ते १९०१ या काळात गाणगापूर येथे आले. असे सांगितले जाते की तेथे प्रत्यक्ष श्रीदत्तांनी दर्शन देऊन त्यांना दीक्षा दिली. त्यानंतर १९०२ ते १९०४ या काळात आर्वी व सुपे येथे त्यांचे वास्तव्य होते.</p>
history.narayan_bet_datta_temple_para3 = <p>१९०५ मध्ये त्यांचे दौंडमध्ये आगमन झाले. त्यानंतर त्यांनी आपले गुरू श्रीदत्ताच्या मंदिरासाठी जागा शोधण्यास सुरुवात केली. सध्या जेथे नारायण बेट आहे ती जागा त्यांनी मंदिरासाठी निवडली व चारही बाजूने ओढा असलेली ही बेटासारखी जागा खरेदी करून त्यांनी त्यावर गुरुमंदिर बांधले. हेच आजचे नारायण बेट दत्त मंदिर होय.</p>
history.narayan_bet_datta_temple_para4 = <p>प्रथम या बेटावर भजन, कीर्तनासारख्या धार्मिक कार्यक्रमांसाठी एका वास्तूचे बांधकाम झाले. त्यानंतर १९१३ मध्ये श्रीदत्त मंदिराचे बांधकाम करण्यात आले. त्यावेळी वसनजी शेट यांनी या मंदिरासाठी साडेतीन किलो वजनाची हिरेजडित सुवर्णमूर्ती दिली होती. प्रथम हीच मूर्ती दत्त मंदिरात स्थापित करण्यात आली होती; परंतु नंतरच्या कालावधीत तेथे नवीन मूर्तीची स्थापना करण्यात आली. सुरक्षिततेच्या कारणास्तव येथील सुवर्णमूर्ती वर्षभर बँक लॉकरमध्ये ठेवण्यात येते व वर्षातील एक दिवस तिचे दर्शन भाविकांना करता येते.</p>
history.narayan_bet_datta_temple_para5 = <p>मंदिरात स्थापित श्रीदत्ताच्या सुवर्णमूर्तीसमोर महाराजांनी १९३० मध्ये पहिले अतिरूद्र अनुष्ठान केले होते. त्याच वर्षी श्री सत्यनारायणाच्या १०८ पूजांचा सोहळा झाला. १९३३ मध्ये या ठिकाणी महाराजांनी एकाचवेळी ११०८ सत्यनारायण महापूजांचा सोहळा पार पाडला. याशिवाय १९३६ मधील मार्च महिन्यात एका आठवड्यात दर तासाला १०८ अशा अहोरात्र सत्यनारायण पूजा झाल्या. त्यानंतर १९३७ मध्ये महाराज तीर्थयात्रेसाठी निघून गेले, ते पुन्हा १९४३ मध्ये बेटावर आले. १९४४ मध्ये महाराजांनी या बेटावर महामृत्युजंय अनुष्ठान केले. १९४५ साली त्यांनी नारायण बेट सोडले व बंगळूरला जे गेले ते परत नारायण बेटावर आलेच नाहीत. तेथेच श्रावण वद्य द्वादशी ३ सप्टेंबर १९४५ या दिवशी अतिरूद्र स्वाहाकार अनुष्ठान झाले व सायंकाळी ५ वाजता सद्गुरू नारायण महाराज दत्तचरणी विलीन झाले. तेथून त्यांच्या अस्थी आणून नारायण बेटातील महाराजांच्या समाधी स्थानावर ठेवण्यात आल्या.</p> 
history.narayan_bet_datta_temple_para6 = <p>सुमारे ११ एकर क्षेत्रात श्रीदत्त मंदिर व महाराजांचे समाधी स्थान आहे. येथील दत्त मंदिर पूर्वाभिमुख असून मंदिराच्या प्रवेशद्वारावर असलेल्या डाव्या स्तंभावर अत्री ऋषी व उजव्या स्तंभावर सती अनसूया यांच्या मूर्ती आहेत. येथील सभामंडप हा अर्धमंडप प्रकारातील आहे. त्यात आठ खांब असून उजव्या बाजूच्या चार खांबांवर मत्स्य, कुर्म, वराह, नरसिंह या मूर्ती, तर डाव्या बाजूच्या खांबांवर वामन, परशुराम, श्रीराम आणि श्रीकृष्ण यांच्या वैशिष्ट्यपूर्ण मूर्ती आहेत. याशिवाय शेषशायी श्री नारायण पहुडले असून त्यांच्या नाभिकमलातून ब्रह्मदेव निर्माण झालेले आहेत आणि माता लक्ष्मी नारायणांची सेवा करते आहे, अशी सुंदर मूर्ती येथे आहे.</p> 
history.narayan_bet_datta_temple_para7 = <p>प्रदक्षिणा मार्गावर रामपंचायतन, दक्षिणाभिमुख हनुमंत, उत्तराभिमुख कुबेर, धर्म, भीम, अर्जुन, नकुल व सहदेव यांच्या मूर्ती आहेत. गर्भगृहाच्या प्रवेशद्वारावर रमा–माधव, तसेच जय–विजय यांच्या मूर्ती आहेत. याशिवाय वरदलक्ष्मी गजांसह उभी असून तिच्या हातात अमृतकलश आहे. उत्तरेला हनुमान, दक्षिणेस महागणपती परस्परांच्या समोर आहेत. गर्भगृहाच्या बाहेर प्रदक्षिणा मार्गावर दक्षिणेला यम, पश्चिमेला वरुण व उत्तरेला कुबेर यांच्या मूर्ती आहेत. मंदिराचे शिखर सुमारे ८० फूट उंचीचे आहे. शिखरावरील ध्वज स्तंभाच्या पूर्व पश्चिम दिशांना सूर्य व चंद्र यांच्या प्रतिमा आहेत.</p>
history.narayan_bet_datta_temple_para8 = <p>नारायण महाराजांनी आखून दिलेल्या नियमांनुसार आजही येथील दैनिक पूजा विधी होतात. सकाळी ५ वाजता घंटानाद, त्यानंतर पंचामृत पूजा, श्रींच्या पादुकांवर रुद्राभिषेक व त्रिकाळ पूजा पार पडते. दर गुरुवारी रात्री ८ वाजता श्रींची पालखीतून मिरवणूक काढली जाते. येथे येणाऱ्या भाविकांना राहण्याची सुविधाही आहे.</p>

