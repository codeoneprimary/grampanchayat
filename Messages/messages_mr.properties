aboutus.vision_title = ग्रामपंचायतीची दृष्टी पुढीलप्रमाणे आहे :
aboutus.vision_details = देऊळगाव गाडा ग्रामपंचायत ही गावाच्या सर्वांगीण, समतोल व शाश्वत विकासासाठी कार्यरत असलेली लोकशाही स्थानिक स्वराज्य संस्था आहे. ग्रामपंचायतीची दृष्टी ही गावातील प्रत्येक नागरिकाला मूलभूत सुविधा, सामाजिक न्याय, आर्थिक संधी व सन्मानपूर्वक जीवनमान उपलब्ध करून देण्यावर केंद्रित आहे.
aboutus.vision_details_ponits = <ol class="vision-list"><li><strong>सर्वांगीण ग्रामविकास</strong><br><p> देऊळगाव गाडा ग्रामपंचायत शिक्षण, आरोग्य, पाणीपुरवठा, स्वच्छता, रस्ते, वीज, जलसंधारण व निवास यांसारख्या मूलभूत सुविधा प्रभावीपणे उपलब्ध करून देण्याची दृष्टी ठेवते. गावातील पायाभूत सुविधा मजबूत करून नागरिकांचे जीवनमान उंचावणे हे प्रमुख उद्दिष्ट आहे.</p> </li><li><strong>कृषी व ग्रामीण अर्थव्यवस्थेचा विकास</strong><br><p> शेती, जलसिंचन, पशुपालन, दुग्धव्यवसाय, स्वयंरोजगार व ग्रामीण उद्योगांना प्रोत्साहन देऊन गावाची अर्थव्यवस्था सक्षम करण्यावर ग्रामपंचायत भर देते. स्थानिक साधनसंपत्तीचा योग्य वापर करून रोजगारनिर्मिती साधण्याचा प्रयत्न केला जातो.</p> </li><li><strong>सर्वसमावेशक व सामाजिक न्यायाधारित विकास</strong><br><p> अनुसूचित जाती, अनुसूचित जमाती, महिला, ज्येष्ठ नागरिक, दिव्यांग व इतर वंचित घटकांना विकासाच्या मुख्य प्रवाहात आणणे ही ग्रामपंचायतीची महत्त्वाची दृष्टी आहे. सर्व घटकांना समान संधी व न्याय मिळावा यासाठी ग्रामपंचायत सतत प्रयत्नशील राहते.</p> </li><li> <strong>स्वच्छ व आरोग्यदायी गाव</strong><br><p> देऊळगाव गाडा ग्रामपंचायत स्वच्छ, सुंदर व आरोग्यदायी गाव निर्माण करण्यासाठी कटिबद्ध आहे. स्वच्छता, घनकचरा व्यवस्थापन, सुरक्षित पाणीपुरवठा व आरोग्य जनजागृतीवर विशेष लक्ष दिले जाते.</p> </li><li><strong>जनसहभाग व पारदर्शकता</strong><br><p> ग्रामसभा व लोकसहभागाच्या माध्यमातून निर्णयप्रक्रियेत पारदर्शकता राखणे, नागरिकांच्या गरजा व सूचना समजून घेणे आणि उत्तरदायी प्रशासन देणे ही ग्रामपंचायतीची दृष्टी आहे.</p> </li><li><strong>शाश्वत व पर्यावरणपूरक विकास</strong><p> पर्यावरण संरक्षण, जलसंधारण, वृक्षारोपण व नैसर्गिक साधनसंपत्तीचे जतन करून पुढील पिढ्यांसाठी शाश्वत विकास साधण्यावर ग्रामपंचायत विश्वास ठेवते.</p></li></ol>
aboutus.mission_title = ग्रामपंचायतीची प्रमुख ध्येये :
aboutus.mission_details = देऊळगाव गाडा ग्रामपंचायतीचे ध्येय हे गावातील सर्व नागरिकांच्या सहभागातून सर्वांगीण, समावेशक, पारदर्शक व शाश्वत विकास साधणे आहे. स्थानिक स्वराज्य संस्थेच्या माध्यमातून प्रभावी सेवा पुरवून ग्रामीण जीवनमान उंचावण्याचा ग्रामपंचायतीचा प्रयत्न आहे.
aboutus.mission_details_ponits =<ol class="vision-list"><li><strong>ग्रामीण पायाभूत सुविधांचा विकास</strong><br><p> पिण्याचे पाणी, स्वच्छता, रस्ते, वीज, सार्वजनिक दिवे, गटारे व इतर नागरी सुविधांची उपलब्धता व गुणवत्ता सुधारून गावाचा भौतिक विकास साधणे. </p></li><li><strong>शिक्षणाचा प्रसार व गुणवत्ता वाढवणे</strong><br><p> गावातील मुलांना शिक्षणाच्या संधी उपलब्ध करून देणे, शालेय सुविधा सुधारणे, शाळाबाह्य मुलांना शिक्षणाच्या प्रवाहात आणणे व शैक्षणिक प्रगतीस प्रोत्साहन देणे. </p></li><li><strong> आरोग्य व स्वच्छता सेवा मजबूत करणे</strong><br><p> आरोग्य जनजागृती, स्वच्छता मोहिमा, पिण्याच्या पाण्याची गुणवत्ता राखणे व शासनाच्या आरोग्य योजनांची प्रभावी अंमलबजावणी करणे. </p></li><li><strong>कृषी, पशुसंवर्धन व स्वयंरोजगाराला चालना</strong><br><p> शेतकऱ्यांना मार्गदर्शन, जलव्यवस्थापन, पशुपालन व दुग्धव्यवसायास प्रोत्साहन देणे तसेच महिलांचे बचत गट व स्वयंरोजगार उपक्रम बळकट करणे. </p></li><li><strong> वंचित घटकांचे सक्षमीकरण</strong><br><p> महिला, अनुसूचित जाती-जमाती, ज्येष्ठ नागरिक, दिव्यांग व आर्थिकदृष्ट्या दुर्बल घटकांसाठी विशेष योजनांची प्रभावी अंमलबजावणी करून त्यांचे सामाजिक व आर्थिक सक्षमीकरण करणे. </p></li><li><strong> जनसहभाग व लोकशाही बळकट करणे</strong><br><p> ग्रामसभा, विविध उपक्रम व चर्चांद्वारे नागरिकांचा सक्रिय सहभाग वाढवणे आणि निर्णयप्रक्रियेत पारदर्शकता व उत्तरदायित्व राखणे. </p></li><li><strong> पर्यावरण संरक्षण व शाश्वत विकास</strong><br><p> जलसंधारण, वृक्षारोपण, स्वच्छ ऊर्जा व पर्यावरणपूरक उपक्रम राबवून गावाचा शाश्वत विकास साधणे. </p></li><li><strong> पारदर्शक व प्रभावी प्रशासन</strong><br><p> ग्रामपंचायतीच्या कामकाजात पारदर्शकता, वेळेत सेवा, नियमबद्ध निर्णयप्रक्रिया व उत्तरदायी प्रशासन सुनिश्चित करणे.</p></li></ol>

aboutus.introduction = प्रस्तावना 
aboutus.para1 = आधुनिक भारताच्या ग्रामीण विकास प्रक्रियेत ग्रामपंचायत ही लोकशाहीची मूलभूत पायरी आहे. पंचायत राज व्यवस्थेच्या त्रिस्तरीय रचनेत गाव पातळीवर ग्रामपंचायत कार्यरत असून ग्रामविकासाचे नियोजन, अंमलबजावणी व देखरेख ही प्रमुख जबाबदारी पार पाडते.महाराष्ट्र ग्रामपंचायत अधिनियम, 1959 व 73 वी घटना दुरुस्ती यांनुसार ग्रामपंचायतींना अधिक अधिकार देण्यात आले असून ग्रामसभेला केंद्रस्थानी ठेवण्यात आले आहे.
aboutus.para2 = देऊळगाव गाडा ग्रामपंचायत ही गावाच्या सर्वांगीण विकासासाठी कार्यरत असलेली लोकशाही, विकेंद्रित व उत्तरदायी संस्था आहे. ग्रामसभा, सरपंच, सदस्य व प्रशासन यांच्या समन्वयातून गावाचा सामाजिक-आर्थिक विकास साधणे हे ग्रामपंचायतीचे प्रमुख उद्दिष्ट आहे.
aboutus.para3 = कायदेशीर अधिष्ठान
aboutus.para4 = महाराष्ट्र ग्रामपंचायत अधिनियम, 1959 अंतर्गत स्थापना
aboutus.para5 = देऊलगाव गाडा या गावासाठी शासन अधिसूचनेद्वारे देऊळगाव गाडा ग्रामपंचायत स्थापन करण्यात आलेली आहे. ही ग्रामपंचायत कायद्याने संस्थापित स्थानिक स्वराज्य संस्था असून तिला अखंड अधिकार परंपरा व सामाईक शिक्का आहे.
aboutus.para6 = <b>ग्रामपंचायतीची रचना </b></br>देऊळगाव गाडा ग्रामपंचायत पुढील घटकांनी बनलेली आहे :<ol class="vision-list"><li>सरपंच</li><li> उपसरपंच</li><li> निवडून आलेले ग्रामपंचायत सदस्य (लोकसंख्येनुसार)</li><li> ग्रामसेवक / ग्रामविकास अधिकारी – पदसिद्ध सचिव</li></ol>
aboutus.para7 = ग्रामपंचायतीची रचना ही राज्य निवडणूक आयोगामार्फत होणाऱ्या सार्वत्रिक निवडणुकांद्वारे निश्चित केली जाते.
aboutus.para8 = <b>ग्रामसभेचे महत्त्व</b> </br><b>ग्रामसभा</b>
aboutus.para9 = देऊळगाव गाडा ग्रामपंचायतीतील सर्व पात्र मतदारांची मिळून बनलेली ग्रामसभा ही सर्वोच्च संस्था आहे.
aboutus.para10 = <b>ग्रामसभेचे अधिकार व कार्ये :</b><ul><li> ग्रामपंचायतीच्या वार्षिक अंदाजपत्रकास मंजुरी </li><li>विकास आराखड्याला मान्यता </li><li>लाभार्थ्यांची निवड </li><li>सामाजिक लेखापरीक्षण </li><li>योजनांच्या अंमलबजावणीवर देखरेख</li></ul>
aboutus.para11 = सरपंचाचे अधिकार व कर्तव्ये
aboutus.para12 = <b>सरपंच हा ग्रामपंचायतीचा प्रमुख असून त्याचे अधिकार पुढीलप्रमाणे :</b><ul><li> ग्रामपंचायतीच्या व ग्रामसभेच्या सभा बोलावणे व अध्यक्षता करणे </li><li>ग्रामपंचायतीचे कामकाज सुरळीत चालविणे </li><li>ग्रामपंचायतीच्या ठरावांची अंमलबजावणी करणे </li><li>आपत्कालीन परिस्थितीत आवश्यक निर्णय घेणे </li><li>पंचायत निधीच्या वापरावर देखरेख ठेवणे</li></ul>
aboutus.para13 = <b>ग्रामसेवक / ग्रामविकास अधिकारी यांची भूमिका</b><ul><li>ग्रामपंचायतीचा पदसिद्ध सचिव </li><li>अभिलेख, नोंदी व हिशेब ठेवणे </li><li>शासनाच्या योजना व आदेशांची अंमलबजावणी </li><li>सरपंच व सदस्यांना प्रशासकीय मदत</li></ul>
aboutus.para14 = <b> ग्रामपंचायतीची कार्ये व अधिकार अनिवार्य कार्ये </b><ul><li>पिण्याच्या पाण्याचा पुरवठा </li><li>स्वच्छता व सांडपाणी व्यवस्था </li><li>रस्ते, गटारे, सार्वजनिक दिवे </li><li>जन्म-मृत्यू नोंद </li><li>आरोग्य व स्वच्छता राखणे</li></ul>
aboutus.para15 = <b>ऐच्छिक कार्ये</b> <ul><li>महिला व बालकल्याण उपक्रम </li><li>वृक्षारोपण व पर्यावरण संवर्धन </li><li>कृषी व पशुसंवर्धनास प्रोत्साहन </li><li>ग्रामविकासाशी संबंधित विशेष योजना</li></ul>
aboutus.para16 = <b>समित्या</b></br><b> देऊळगाव गाडा ग्रामपंचायतीअंतर्गत आवश्यकतेनुसार पुढील समित्या स्थापन केल्या जाऊ शकतात :</b> <ul><li>वित्त व कर समिती </li><li>स्वच्छता व आरोग्य समिती </li><li>महिला व बालकल्याण समिती </li><li>पाणीपुरवठा व स्वच्छता समिती</li></ul>
aboutus.para17 = <b>सभा व कामकाज</b> <ul><li>ग्रामपंचायतीची किमान एक सभा दरमहा </li><li>ग्रामसभेच्या किमान चार सभा दरवर्षी </li><li>सर्व ठराव नोंदवहीत नमूद करणे बंधनकारक</li></ul>
aboutus.para18 = <b> विकास योजना व प्रकल्प</b></br><b> देऊळगाव गाडा ग्रामपंचायत खालील योजनांची अंमलबजावणी करते :</b> <ul><li> महात्मा गांधी राष्ट्रीय ग्रामीण रोजगार हमी योजना </li><li>स्वच्छ भारत अभियान </li><li>जलजीवन मिशन </li><li>प्रधानमंत्री आवास योजना </li><li>राज्य शासनाच्या विविध ग्रामीण विकास योजना</li></ul>
aboutus.para19 = <b>निष्कर्ष</b></br>देऊळगाव गाडा ग्रामपंचायत ही गावाच्या सर्वांगीण विकासासाठी कार्यरत असलेली लोकशाही, विकेंद्रित व उत्तरदायी संस्था आहे. ग्रामसभा, सरपंच, सदस्य व प्रशासन यांच्या समन्वयातून गावाचा सामाजिक-आर्थिक विकास साधणे हे ग्रामपंचायतीचे प्रमुख उद्दिष्ट आहे.

