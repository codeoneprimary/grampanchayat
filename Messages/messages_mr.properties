current_schemes_text_card5 = इंदिरा गांधी राष्ट्रीय वृद्धापकाळ निवृत्तीवेतन योजना (IGNOAPS) दारिद्र्यरेषेखालील (BPL) ६० वर्षे किंवा त्याहून अधिक वय असलेल्या ज्येष्ठ नागरिकांना आर्थिक मदत करते. याअंतर्गत ६०-७९ वयोगटातील व्यक्तींना दरमहा ₹२०० आणि ८० वर्षांवरील व्यक्तींना ₹५०० केंद्र सरकारकडून पेन्शन मिळते. महाराष्ट्रात, पात्र व्यक्तींना 'श्रावणबाळ सेवा राज्य पेन्शन योजने'अंतर्गत अतिरिक्त रक्कम मिळून एकूण ₹१,५०० पर्यंत पेन्शन मिळू शकते.<div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता  </th><th> आवश्यक कागदपत्रे  </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <ul><li>अर्जदार भारतीय नागरिक असावा.</li><li>वय ६० वर्षे किंवा त्याहून अधिक असावे </li><li>अर्जदार दारिद्र्यरेषेखालील (BPL) कुटुंबातील असावा </li><li>अर्जदाराकडे उत्पन्नाचे निश्चित साधन नसावे. </li></ul></td><td><ul><li>आधार कार्ड </li><li>वयाचा पुरावा (उदा. जन्म दाखला, शाळा सोडल्याचे प्रमाणपत्र)</li><li>दारिद्र्यरेषेखालील (BPL) रेशन कार्ड किंवा प्रमाणपत्र </li><li>निवासी पुरावा (रेशन कार्ड, वीज बिल, मतदान कार्ड) </li><li>बँक किंवा पोस्ट ऑफिस पासबुकची झेरॉक्स </li><li>पासपोर्ट आकाराचे फोटो </li><li>स्वाक्षरी केलेला अर्ज. </li></ul></td></tr></tbody> </table></div>

