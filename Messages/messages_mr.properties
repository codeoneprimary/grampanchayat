current_schemes_text_card7 = प्रधानमंत्री किसान सन्मान निधी (PM-KISAN) योजनेअंतर्गत पात्र शेतकरी कुटुंबांना दरवर्षी ६,००० रुपयांची आर्थिक मदत थेट बँक खात्यात (दर ४ महिन्यांनी २००० रुपयांचे ३ हप्ते) मिळते.<div class="table-container"> <table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता </th><th> आवश्यक कागदपत्रे  </th><th>नोंदणी कशी करावी? </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <ul><li>भूमीधारक शेतकरी: ज्यांच्या नावावर शेतीयोग्य जमीन (Cultivable land) आहे असे शेतकरी पात्र आहेत.</li><li>जमिनीची मर्यादा: पूर्वी केवळ २ हेक्टरची मर्यादा होती, परंतु आता ती रद्द करण्यात आली असून सर्व लहान व सीमांत शेतकरी पात्र आहेत.</li><li>कुटुंब व्याख्या: पती, पत्नी आणि अल्पवयीन मुले (Minor Children) या योजनेसाठी एक कुटुंब मानले जाते.</li><li>आधार लिंकिंग: बँक खाते आधारशी जोडलेले असणे अनिवार्य आहे.</li><li>ई-केवायसी (eKYC): लाभार्थी शेतकऱ्यांनी ई-केवायसी करणे अनिवार्य आहे. </li></ul> </td><td><ul><li>आधार कार्ड (Aadhaar Card): सर्वात महत्त्वाचे दस्तऐवज.</li><li>जमिनीचे कागदपत्रे (Land Holding Papers): ७/१२ उतारा आणि ८-अ (7/12 & 8A) प्रमाणपत्र.</li><li>बँक पासबुक (Bank Passbook): खाते नंबर आणि IFSC कोडसह.</li><li>ओळखपत्र: मतदार ओळखपत्र (Voter ID) किंवा पॅन कार्ड.</li><li>मोबाईल नंबर: आधार लिंक असलेला मोबाईल नंबर.</li><li>रेशन कार्ड (Ration Card). </li></ul></td><td><ul><li>ऑनलाईन: PM-KISAN च्या अधिकृत पोर्टलवर (pmkisan.gov.in) जाऊन -New Farmer Registration द्वारे.</li><li>ऑफलाईन: नजीकच्या सामान्य सेवा केंद्रावर (CSC Center) जाऊन अर्ज करू शकता.</li><li>अद्ययावत माहिती: आता प्रत्येक शेतकऱ्याला आधारशी जोडलेली 'Farmer ID' मिळणे अनिवार्य होणार आहे, ज्याद्वारे बियाणे आणि खतांचे वितरण देखील केले जाईल</li></ul></td></tr></tbody> </table></div>

