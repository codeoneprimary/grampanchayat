health_department.introduction = आरोग्य सेवा अवलोकन
health_department.para1 = देऊळगाव गाडा ग्रामपंचायत नागरिकांना प्राथमिक आणि प्रतिबंधात्मक आरोग्य सेवा पोहोचविण्याचे काम करते. ग्रामपंचायत सार्वजनिक आरोग्य विभाग सोबत समन्वय साधून खालील सेवा पुरवते:
health_department.para2 = <div class="table-container"><table class="custom-table"> <tbody> <tr><td> 1 </td><td> प्राथमिक आरोग्य केंद्रे (PHC) आणि आरोग्य उपकेंद्रांद्वारे प्राथमिक आरोग्य सुविधा </td></tr><tr><td> 2 </td><td> लसीकरण आणि मातृ-शिशु आरोग्य कार्यक्रम </td></tr><tr><td> 3 </td><td> रोग प्रतिबंध आणि आरोग्य जागरूकता मोहीम </td></tr><tr><td> 4 </td><td> शाळा विद्यार्थ्यां आणि ज्येष्ठ नागरिकांची आरोग्य तपासणी </td></tr></table></div>
health_department.para3 = <b>आरोग्य पायाभूत सुविधा</b><div class="table-container"><table class="custom-table"> <thead> <tr> <th> सुविधा प्रकार</th><th> ग्रामपंचायत / आसपासच्या भागातील संख्या </th></tr> </thead><tbody> <tr> <td> प्राथमिक आरोग्य केंद्र (PHC)</td><td> 1 (सुमारे 30,000 लोकसंख्येसाठी)</td></tr><td> आरोग्य उपकेंद्र</td><td> 1 (सुमारे 5,000 लोकसंख्येसाठी)</td></tr><td> समुदाय आरोग्य कार्यक्रम</td><td> लसीकरण मोहिमा, मातृ-शिशु आरोग्य सेवा</td></tr><td> मोबाइल/आउटरीच सेवा</td><td> नियमित आरोग्य शिबिरे व तपासण्या</td></tr></tbody> </table></div><br/>टीप: PHC आणि उपकेंद्रामध्ये बाह्य रुग्ण उपचार, प्रतिबंधात्मक काळजी, लहान शस्त्रक्रिया, आरोग्य जागरूकता कार्यक्रम आणि आवश्यकतेनुसार जिल्हा रुग्णालयात संदर्भ सेवा दिली जाते.
