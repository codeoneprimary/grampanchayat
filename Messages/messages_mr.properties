current_schemes_text_card8 = महाराष्ट्रात कृषी समर्थन योजना (उदा. महाडीबीटी) अंतर्गत शेतकऱ्यांना बियाणे, यंत्रसामग्री, आणि सिंचन साधनांवर अनुदान मिळते. पात्रतेसाठी शेतकरी महाराष्ट्र रहिवासी असावा, ७/१२ उतारा आणि बँक खाते असणे आवश्यक आहे. अर्ज 'महाडीबीटी' (MahaDBT) पोर्टलवर, 'पहिले येईल, त्यास प्राधान्य' तत्त्वावर केले जातात. <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>कृषी योजना पात्रता </th><th> आवश्यक कागदपत्रे  </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td>  <ul><li>अर्जदार महाराष्ट्र राज्याचा रहिवासी असावा.</li><li>शेतकऱ्याच्या नावावर स्वतःची शेतजमीन असावी.</li><li>लघु, सीमांत, महिला आणि SC/ST शेतकऱ्यांना विशेष प्राधान्य.</li><li>एका कुटुंबातील फक्त एकाच व्यक्तीला एका घटकासाठी लाभ मिळेल. </li></ul> </td><td></li><li>आधार कार्ड: (बँक खात्याशी लिंक असणे अनिवार्य).</li><li>७/१२ उतारा आणि ८-अ चा उतारा: (नमुना ६/१२ किंवा चालू खतांची रसीद).</li><li>बँक पासबुकची छायांकित प्रत: (IFSC कोडसह).</li><li>जातीचे प्रमाणपत्र: (SC/ST प्रवर्गासाठी).</li><li>पासपोर्ट आकाराचा फोटो. </li></ul></td></tr></tbody> </table></div>

