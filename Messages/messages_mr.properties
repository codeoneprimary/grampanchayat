current_schemes_text_card9 = सुकन्या समृद्धी योजना (SSY) ही मुलींच्या शिक्षणासाठी आणि लग्नासाठी भारत सरकारची एक उत्तम बचत योजना आहे. १० वर्षांपेक्षा कमी वयाच्या मुलीचे खाते पालक उघडू शकतात . यासाठी दरवर्षी किमान ₹२५० ते कमाल ₹१.५ लाख गुंतवता येतात. खाते २१ वर्षांनी मॅच्युअर होते. हे खाते जवळच्या टपाल कार्यालयात (Post Office) किंवा अधिकृत बँकेत उघडता येते . <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता </th><th> आवश्यक कागदपत्रे </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <ul><li>वयाची अट: मुलगी १० वर्षांपेक्षा कमी वयाची असावी .</li><li>नागरिकत्व: मुलगी भारतीय नागरिक असावी.</li><li>खात्यांची संख्या: एका मुलीच्या नावाने फक्त एकच खाते उघडता येते. एका पालकाला दोन मुलींसाठी (काही परिस्थितीत तीन) खाते उघडता येते.</li></ul></td><td></li><li>मुलीचे जन्म प्रमाणपत्र (Birth Certificate): (मूळ आणि प्रत) .</li><li>पालकांचे आधार कार्ड (Aadhaar Card): (ओळख आणि पत्त्याचा पुरावा).</li><li>पॅन कार्ड (PAN Card): (पालकांचे).</li><li>फोटो: मुलीचा आणि पालकांचा फोटो.</li><li>अर्ज (Application Form): SSY खाते उघडण्याचा फॉर्म. </li></ul></td></tr></tbody> </table></div>

