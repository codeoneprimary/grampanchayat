#agricultureDepartment
agriculture_department.title = देऊळगाव गाडा ग्रामपंचायत – कृषी विभागाचा अहवाल
agriculture_department.para1 = विभागाचा परिचय
agriculture_department.para2 = देऊळगाव गाडा ग्रामपंचायत अंतर्गत कृषी विभाग हे ग्रामीण विकास व शेतकऱ्यांच्या कल्याणासाठी कार्यरत आहे. या विभागाचा मुख्य उद्देश गावातील शेतकऱ्यांना शेतीसंबंधी मार्गदर्शन देणे, आधुनिक तंत्रज्ञान व संसाधने उपलब्ध करून देणे, तसेच केंद्र, राज्य व जिल्हा परिषदेच्या योजना प्रभावीपणे गावातील शेतकऱ्यांपर्यंत पोहचवणे आहे.
agriculture_department.para3 = कृषी विभाग खालील प्रमुख कार्ये पार पाडतो:
agriculture_department.para4 = <ol><li> गावातील शेतकऱ्यांना आधुनिक शेती तंत्रज्ञान व औजारे यांची माहिती देणे. </li><li> रासायनिक व सेंद्रिय खते, बियाणे व औषधे यांची तपासणी करणे. </li><li> राज्य व केंद्र सरकारच्या कृषी योजना ग्रामपातळीवर लागू करणे व लाभार्थ्यांपर्यंत पोहचवणे. </li><li> शेतकऱ्यांना बायोगॅस, कृषी पुरस्कार, पीक स्पर्धा, कृषी पर्यटन यासारख्या योजनांमध्ये सहभागी करून आर्थिक लाभ मिळवून देणे. </li><li> ग्रामपंचायत व कृषी अधिकारी यांच्या समन्वयातून शेतकरी हिताचे धोरण आखणे. </li></ol>
agriculture_department.para5 = ग्रामीण भागात कृषी विभागाचा कार्यक्षेत्र अत्यंत महत्त्वाचा आहे कारण शेती हा गावातील लोकसंख्येचा मुख्य आधार आहे. शेतकरी लाभार्थी म्हणून विकासाचे मुख्य साधन असून, त्यांच्याशिवाय ग्रामीण अर्थव्यवस्थेचा विकास अशक्य आहे.
agriculture_department.para6 = विभागाचे उद्दिष्टे व कार्यक्षेत्र
agriculture_department.para7 = <ol><li> उद्दिष्टे<ol><li> <b> शेतीस आधुनिक तंत्रज्ञानाची माहिती पोहचवणे:</b><br/> देऊळगाव गाडा ग्रामपंचायतातील शेतकऱ्यांना आधुनिक पिक तंत्रज्ञान, नवीन औजारे व उपकरणे वापरण्याचे प्रशिक्षण देणे. हे तंत्रज्ञान पिक उत्पादन वाढवण्यासाठी व उत्पन्न सुधारण्यासाठी उपयुक्त ठरते. </li><li><b> सेंद्रिय शेती व नैसर्गिक खतांचे प्रोत्साहन:</b> <br/>रासायनिक खतांच्या अवलंबनाऐवजी सेंद्रिय खते, कम्पोस्ट, व जैविक कीटकनाशकांचा वापर वाढविणे. सेंद्रिय शेतीमुळे मातीची सुपीकता टिकते व पर्यावरणास हानी होत नाही. </li><li><b> केंद्र व राज्य शासनाच्या योजनांचा लाभ देणे:</b> <br/>शेतकऱ्यांना केंद्र व राज्य शासनाच्या विविध योजनांविषयी माहिती देणे, अर्ज प्रक्रिया सोपी करणे आणि थेट DBT (डायरेक्ट बेनिफिट ट्रान्सफर) द्वारे अनुदान मिळवून देणे. </li><li><b> आर्थिक व सामाजिक उन्नती साधणे:</b><br/> शेतकऱ्यांना आर्थिक लाभ देऊन त्यांच्या जीवनमानात सुधारणा करणे व गावातील सामाजिक विकासाला गती मिळवून देणे. </li><li><b> शेती क्षेत्रात नावीन्यपूर्ण संशोधन व प्रयोग:</b><br/> गावात पिक निवड, सिंचन तंत्रज्ञान, खत व बियाणे यासंबंधी प्रयोग करून उत्पादनक्षमता वाढविणे. </li></ol> </li> <li> <b>कार्यक्षेत्र</b><br/> कृषी विभागाचे कार्यक्षेत्र खालीलप्रमाणे आहे: <ol><li> <b>शेतकऱ्यांना प्रशिक्षण व मार्गदर्शन:</b> <ul><li>पीक लागवडीचे योग्य तंत्र, खतांचे प्रमाण व सिंचन पद्धती यावर प्रशिक्षण </li><li> शेतकऱ्यांसाठी कृषी कार्यशाळा व फील्ड डेमोंस्ट्रेशन </li><li> नवीन पिकांची निवड व उच्च उत्पन्न पिकांसाठी सल्ला </li></ul> </li><li><b>योजना व अनुदान वितरण:</b> <ul><li>राज्य व केंद्र शासनाच्या योजनांचा लाभ गावातील शेतकऱ्यांना मिळवून देणे </li><li> अर्ज प्रक्रिया, लाभार्थी निवड व DBT मार्फत थेट खात्यामध्ये अनुदान वर्ग करणे </li></ul> </li><li><b>खते, बियाणे व कृषी औषधांचे नमुने तपासणी:</b> <ul><li>रासायनिक खतांचे व बियाण्यांचे गुणवत्तापरीक्षण </li><li> शेतकऱ्यांना योग्य व दर्जेदार उत्पादने वापरण्याची माहिती </li></ul> </li><li><b>विशेष कार्यक्रम व पुरस्कार योजना:</b> <ul><li>बायोगॅस योजना </li><li> डॉ. बाबासाहेब आंबेडकर कृषी स्वावलंबन योजना </li><li> राज्य पातळीवरील पीक स्पर्धा व कृषी पुरस्कार </li></ul> </li><li><b>कृषी पर्यटन व नवीनीकरण:</b> <ul><li>ग्रामीण भागातील शेती, कृषी तंत्रज्ञान व पर्यावरणीय दृष्ट्या महत्त्वाच्या कार्यक्रमांत शेतकऱ्यांचा सहभाग </li><li>कृषी पर्यटनासाठी शेतकऱ्यांचे मार्गदर्शन </li></ul> </li></ol> </li></ol>
agriculture_department.para8 =  प्रमुख योजना व लाभार्थी निवड
agriculture_department.para9 = <ol><li><b> बायोगॅस योजना</b> <ul><li> उद्दिष्ट: गावातील शेतकरी कुटुंबांना स्वयंपूर्ण ऊर्जा स्रोत उपलब्ध करून देणे </li><li> लाभार्थी निवड: अर्जदार शेतकरी, ज्यांच्याकडे गायी/सांभळी आहेत </li><li> DBT द्वारे अनुदान हस्तांतरण </li></ul> </li><li><b>डॉ. बाबासाहेब आंबेडकर कृषी स्वावलंबन योजना</b> <ul><li> उद्दिष्ट: शेतकऱ्यांना आधुनिक शेती व उत्पादनासाठी सहाय्य </li><li> लाभार्थी निवड: आर्थिक दृष्ट्या दुर्बल शेतकरी व अनुसूचित जाती- जमातीचे शेतकरी </li><li> अनुदान थेट खात्यामध्ये वर्ग करून आधुनिक पिक सामग्री व उपकरणे पुरवणे </li></ul> </li><li><b>विविध कृषी पुरस्कार व स्पर्धा </b> <ul><li> राज्य व जिल्हा पातळीवरील कृषी पुरस्कार </li><li> पीक स्पर्धा व उत्कृष्ट शेतकऱ्यांची निवड </li><li> गावातील शेतकऱ्यांना नाव व प्रतिष्ठा प्रदान करणे </li></ul> </li><li><b> कृषी पर्यटन योजना </b><ul><li> गावातील शेतकऱ्यांसाठी पर्यटकांसमोर शेती प्रदर्शने व अनुभव सत्र </li><li> आर्थिक लाभ व गावाचा विकास </li></ul> </li></ol>
agriculture_department.para10 = शेतकरी प्रशिक्षण व मार्गदर्शन
agriculture_department.para11 = <ol> <li> <b>सिंचन व पाणी व्यवस्थापन:</b> <ul> <li>ड्रिप सिंचन, स्प्रिंकलर पद्धती व पाण्याचे शाश्वत व्यवस्थापन</li> <li>पावसाळ्यापूर्वी पाण्याची योग्य साठवण</li> </ul> </li> <li> <b>पीक निवड व लागवड तंत्रज्ञान:</b> <ul> <li>उच्च उत्पन्न पिकांसाठी मार्गदर्शन</li> <li>बहुपिक पद्धती व सेंद्रिय शेतीचे तंत्र</li> </ul> </li> <li> <b>खते व बियाणे व्यवस्थापन:</b> <ul> <li>रासायनिक व सेंद्रिय खतांचा योग्य वापर</li> <li>दर्जेदार बियाण्यांचे उत्पादन</li> </ul> </li> <li> <b>कीटक व रोग नियंत्रण:</b> <ul> <li>नैसर्गिक कीटकनाशक व जैविक उपाय</li> <li>रोग नियंत्रणासाठी मार्गदर्शन</li> </ul> </li> </ol>
agriculture_department.para12 = ग्रामपंचायत सहकार्य
agriculture_department.para13 = <b> देऊळगाव गाडा ग्रामपंचायत कृषी विभागासह समन्वय साधते:</b> <ul><li> गावातील शेतकऱ्यांसाठी कृषी कार्यशाळा आयोजित करणे </li><li> शेतकऱ्यांचे अर्ज घेणे व लाभार्थी निवडणे </li><li> DBT माध्यमातून अनुदान वितरित करणे </li><li> कृषी पर्यटन व प्रात्यक्षिके आयोजित करणे</li></ul>
agriculture_department.para14 = गावातील कृषी परिस्थिती
