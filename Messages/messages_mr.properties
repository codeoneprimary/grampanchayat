current_schemes_name_card1 = प्रधानमंत्री आवास योजना – शहरी 2.0
current_schemes_link_card1 = <a href="https://pmaymis.gov.in/PMAYMIS2_2024/PmayDefault.aspx" target="_blank">https://pmaymis.gov.in/PMAYMIS2_2024 /PmayDefault.aspx </a>
current_schemes_text_card1 = <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता निकष:</th><th>आवश्यक कागदपत्र</th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <ul><li>कुटुंब व्याख्या: पती, पत्नी आणि अविवाहित मुले (लाभार्थी).</li><li>मालकी: अर्जदाराचे भारतात कुठेही पक्के घर नसावे.</li><li>उत्पन्न गट: <br/>EWS: वार्षिक उत्पन्न ₹3 लाखांपर्यंत.<br/>LIG: वार्षिक उत्पन्न ₹3 लाख ते ₹6 लाख.</li><li>मालमत्तेचे स्थान: 2011 च्या जनगणनेनुसार वैधानिक शहरे.</li><li>क्षेत्रफळ: घराचे चटई क्षेत्र (Carpet Area) 120 चौरस मीटरपेक्षा कमी असावे.</li></ul></td><td><ul><li>आधार कार्ड (अर्जदार आणि कुटुंबातील सदस्यांचे).</li><li>ओळख पुरावा: पॅन कार्ड, पासपोर्ट किंवा मतदान कार्ड.</li><li>पत्ता पुरावा: वीज बिल, रेशन कार्ड, किंवा बँक पासबुक.</li><li>उत्पन्नाचा पुरावा:<br/>पगारदार: पगाराची स्लिप (गेल्या 2 महिन्यांची).<br/>स्वयंरोजगार: ITR (Income Tax Returns) पावत्या.</li><li>बँक स्टेटमेंट: मागील 6 महिन्यांचे.</li><li>घराचे प्रमाणपत्र: जर स्वतःच्या जागेवर घर बांधत असाल तर जागेचे कागदपत्र.</li></ul></td></tr></tbody> </table></div>

current_schemes_name_card2 = ग्रामपंचायत आवास योजना
current_schemes_link_card2 = <a href="https://rdd.maharashtra.gov.in/en/" target="_blank">https://rdd.maharashtra.gov.in/en/</a>
current_schemes_text_card2 = <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता </th><th>आवश्यक कागदपत्रे  </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <ul><li>निवासी: अर्जदार महाराष्ट्रातील ग्रामीण भागाचा कायमचा रहिवासी असावा.</li><li>घर: कुटुंबाकडे भारतात कुठेही स्वतःचे पक्के घर नसावे (कच्चे घर किंवा बेघर).</li><li>उत्पन्न: आर्थिकदृष्ट्या दुर्बल (EWS - ₹३ लाख वार्षिक) किंवा कमी उत्पन्न गट (LIG - ₹६ लाख वार्षिक) मधून असणे.</li><li>निवड: SECC-2011 (सामाजिक-आर्थिक आणि जात जनगणना) डेटाबेसमध्ये नाव असावे.</li><li>प्राधान्य: बीपीएल (BPL - गरिबी रेषेखालील) कुटुंबांना प्राधान्य. </li></ul></td> <td><ul><li>आधार कार्ड (अर्जदार आणि जोडीदार).</li><li>रेशन कार्ड.</li><li>जातीचे प्रमाणपत्र (जर अनुसूचित जाती/जमाती किंवा अल्पसंख्याक प्रवर्गातील असाल).</li><li>सातबारा (७/१२) उतारा किंवा मालमत्ता नोंदणी कागदपत्रे (घरासाठी जागा असल्याचा पुरावा).</li><li>ग्रामपंचायत मालमत्ता नोंदवहीतील उतारा (ग्रामपंचायत दप्तरी नोंद).</li><li>उत्पन्नाचा दाखला (सक्षम प्राधिकाऱ्याने दिलेला).</li><li>बँक खाते पासबुक (आधार लिंक केलेले).</li><li>मनरेगा जॉब कार्ड (असल्यास).</li><li>पासपोर्ट आकाराचा फोटो. </li></ul></td></tr></tbody> </table></div>

current_schemes_name_card3 = आयुष्मान भारत – प्रधानमंत्री जन आरोग्य योजना
current_schemes_link_card3 =<a href="https://beneficiary.nha.gov.in/" target="_blank"> https://beneficiary.nha.gov.in/</a>
current_schemes_text_card3 = आयुष्मान भारत - प्रधानमंत्री जन आरोग्य योजना (AB-PMJAY) ही आर्थिकदृष्ट्या दुर्बल कुटुंबांना दरवर्षी ₹५ लाखांपर्यंत मोफत उपचार (कॅशलेस) देणारी सरकारी योजना आहे . ग्रामीण भागातील भूमिहीन, कच्च्या घरांचे नागरिक आणि शहरी भागातील निश्चित केलेल्या गरीब कुटुंबांतील व्यक्ती या योजनेसाठी पात्र आहेत, ज्यांची ओळख २०११ च्या जनगणनेनुसार (SECC 2011) केली जाते . <div class="table-container"><table class="custom-table"> <thead> <tr> <th>महत्त्वाची पात्रता </th><th> आवश्यक कागदपत्रे </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td><ul><li>ग्रामीण भाग: कच्चे घर, भूमिहीन मजूर, किंवा अनुसूचित जाती/जमातीतील (SC/ST) कुटुंबे [५].</li><li>शहरी भाग: बेघर, भिकारी, घरकामगार, सफाई कामगार, फेरीवाले, कारागीर इ. </li><li>वय: 70 वर्षांपेक्षा जास्त वयाचे सर्व ज्येष्ठ नागरिक (कुटुंबाच्या उत्पन्नाची अट न लावता) स्वतंत्र कव्हरसाठी पात्र आहेत .</li></ul></td><td> <ul><li>आधार कार्ड (Aadhaar Card): सर्व कुटुंबातील सदस्यांचे </li><li>रेशन कार्ड (Ration Card): कुटुंबाची ओळख सिद्ध करण्यासाठी. </li><li>उत्पन्न प्रमाणपत्र (Income Certificate): (बीपीएल प्रमाणपत्र).</li><li>जात प्रमाणपत्र (Caste Certificate): (आवश्यक असल्यास).</li><li>मोबाईल नंबर (नोंदणीसाठी). </li><li>₹५ लाखांपर्यंत मोफत उपचार: देशभरातील सरकारी आणि सूचीबद्ध खाजगी रुग्णालयांमध्ये (Hospitals) कॅशलेस सुविधा .</li><li>कव्हर केलेले आजार: हृदयविकार, कॅन्सर, किडनी विकार, कोविड-१९, आणि इतर गंभीर आजार (सर्जरीसह).</li><li>फॅमिली कव्हर: कुटुंबातील सदस्यांची संख्या किंवा वयावर कोणतीही मर्यादा नाही . </li></ul></td></tr></tbody> </table></div>

