current_schemes_text_card4 = <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता निकष </th><th>आवश्यक कागदपत्रे  </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <b>लक्ष्य गट</b>:<br/>नोंदणीकृत कामगार (बांधकाम मजूर), कामगारांच्या विधवा किंवा आर्थिकदृष्ट्या दुर्बल विद्यार्थी.<br/><b>शैक्षणिक पात्रता:</b><ul><li>विद्यार्थ्यांनी त्यांच्या मागील वर्गात/परीक्षेत (उदा. 10वी किंवा 12वी) साधारणपणे किमान 50-60% गुण मिळवलेले असावेत.</li><li>संस्था प्रकार:<br/> विद्यार्थी सरकारी मान्यताप्राप्त किंवा अधिकृत शैक्षणिक संस्थेत प्रवेश घेतलेला असावा.</li><li>उत्पन्न निकष:<br/>कुटुंबाचे वार्षिक उत्पन्न मर्यादा निश्चित असते (राज्यानुसार बदलते, साधारणपणे ₹4.5 लाख ते ₹8 लाख पर्यंत).</li><li>नोंदणी आवश्यकता:<br/> कामगारांसाठी संबंधित राज्याच्या **बिल्डिंग अँड अदर कन्स्ट्रक्शन वर्कर्स वेल्फेअर बोर्ड** मध्ये नोंदणी आवश्यक आहे (साधारणपणे किमान 1 वर्षाची नोंदणी आवश्यक असते).</li><li> कुटुंब मर्यादा:<br/> लाभ सामान्यतः एका कुटुंबातील जास्तीत जास्त दोन मुलांपर्यंत मर्यादित असतात.</li></ul></td><td><ul><li>शैक्षणिक सहाय्य योजनेसाठी अर्ज करताना खालील कागदपत्रे आवश्यक असतात:</li><li> विद्यार्थ्याचा आणि पालकांचा आधार कार्ड</li><li>पालकांचा कामगार नोंदणी कार्ड (Labor Registration Card) (मूळ/प्रति)</li><li> मागील उत्तीर्ण परीक्षेची गुणपत्रिका (10वी, 12वी इ.)</li><li> सध्याच्या शैक्षणिक संस्थेकडून बोनाफाइड प्रमाणपत्र<br/>बँक पासबुक (आधार लिंक असलेले खाते)</li><li>उत्पन्न प्रमाणपत्र (आवश्यक असल्यास)</li><li> सध्याच्या कोर्सचे फी पावती / फी स्ट्रक्चर </li><li> मुलांची संख्या आणि उत्पन्नाबाबत स्वयंघोषणा / प्रतिज्ञापत्र (Affidavit)<br/>पासपोर्ट साईज फोटो </li><li> कामगाराचा मृत्यू प्रमाणपत्र (मृत बांधकाम कामगारांसाठी विशेष सहाय्यासाठी अर्ज करत असल्यास)</li></ul></td></tr></tbody> </table></div>

