current_schemes_text_card10 = महाराष्ट्र सरकार महिला सक्षमीकरणासाठी विविध स्वयंरोजगार योजना (उदा. महाज्योती, अण्णासाहेब पाटील महामंडळ, जिल्हा परिषद योजना) राबवते, ज्याद्वारे महिलांना १० लाखांपर्यंत विनातारण कर्ज, ब्युटी पार्लर, शिलाई मशीन सारख्या व्यवसायांसाठी अनुदान आणि प्रशिक्षण मिळते. या योजनांसाठी वय १८-६० वर्षे, महाराष्ट्राचे अधिवास प्रमाणपत्र, आणि दारिद्र्यरेषेखालील (BPL) किंवा अल्प उत्पन्न गट पात्रता आवश्यक आहे. <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>महिला स्वयंरोजगार योजना पात्रता  </th><th> आवश्यक कागदपत्रे  </th><th>अर्ज कसा करावा?</th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> </li><li>निवासी: अर्जदार महिला महाराष्ट्राची रहिवासी असावी </li><li>वय: वय १८ ते ६० वर्षांच्या दरम्यान असावे </li><li>उत्पन्न: गरीब रेषेखालील (BPL) किंवा मध्यम उत्पन्न वर्गातील महिला </li><li>प्राधान्य: अनुसूचित जाती/जमाती आणि मागासवर्गातील महिलांना प्राधान्य </li><li>बचत गट: काही योजनांसाठी बचत गटाचे सदस्य असणे आवश्यक असू शकते, परंतु काही वैयक्तिक कर्ज योजना देखील आहेत </li></ul></td><td><ul><li>रमुख स्वयंरोजगार योजना आणि लाभ:</li><li>महिला स्वयंसिद्धी योजना: १० लाखांपर्यंत कर्ज </li><li>जिल्हा परिषद स्वयंरोजगार योजना: शिलाई मशीन, पीठ गिरणी, मिरची कांडप यंत्र यांसारख्या साधनांसाठी १००% अनुदानावर मदत </li><li>महिला उद्योजकता व कौशल्य विकास अभियान: २ लाखांपर्यंत सूक्ष्म कर्ज आणि प्रशिक्षण </li></ul></td><td><ul><li>तुम्ही जिल्हा परिषद, महिला व बाल विकास विभाग किंवा जवळच्या अण्णासाहेब पाटील महामंडळाच्या कार्यालयात भेट देऊन अर्ज करू शकता </li><li>'महिला स्वयंसिद्धी'साठी १० लाखांपर्यंत घ्या कर्ज; आवश्यक </li><li>28 Sept 2025 — योजनेसाठी अटी, पात्रता > अर्जदार महिला राज्यातील रहिवासी असावी. तिचे वय १८ ते ६० दरम्यान असावे. > अर्जदार गरीब रेषेखालील किंवा मध्...</li><li>आधार कार्ड </li><li>महाराष्ट्राचे रहिवासी प्रमाणपत्र (Domicile Certificate)।</li><li>उत्पन्न प्रमाणपत्र (तहसीलदारांचे)</li><li>बँक पासबुकच्या पहिल्या पानाची छायाप्रत (बँक खाते आधार लिंक असावे)</li><li>रेशन कार्ड / शिधापत्रिका </li><li>पासपोर्ट आकाराचे फोटो </li><li>जातीचा दाखला (लागू असल्यास)</li><li> व्यवसाय आराखडा (Project Report - जर कर्जासाठी अर्ज करत असाल)</li></ul></td></tr></tbody> </table></div>


