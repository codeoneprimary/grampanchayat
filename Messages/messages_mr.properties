health_department.introduction = आरोग्य सेवा अवलोकन
health_department.para1 = देऊळगाव गाडा ग्रामपंचायत नागरिकांना प्राथमिक आणि प्रतिबंधात्मक आरोग्य सेवा पोहोचविण्याचे काम करते. ग्रामपंचायत सार्वजनिक आरोग्य विभाग सोबत समन्वय साधून खालील सेवा पुरवते:
health_department.para2 = <ul><li> प्राथमिक आरोग्य केंद्रे (PHC) आणि आरोग्य उपकेंद्रांद्वारे प्राथमिक आरोग्य सुविधा </li><li> लसीकरण आणि मातृ-शिशु आरोग्य कार्यक्रम </li><li> रोग प्रतिबंध आणि आरोग्य जागरूकता मोहीम </li><li> शाळा विद्यार्थ्यां आणि ज्येष्ठ नागरिकांची आरोग्य तपासणी</li></ul> 
health_department.para3 = <b>आरोग्य पायाभूत सुविधा</b><table> <thead> <tr> <th> सुविधा प्रकार</th><th> ग्रामपंचायत / आसपासच्या भागातील संख्या </th></tr> </thead><tbody> <tr> <td> प्राथमिक आरोग्य केंद्र (PHC)</td><td> 1 (सुमारे 30,000 लोकसंख्येसाठी)</td></tr><td> आरोग्य उपकेंद्र</td><td> 1 (सुमारे 5,000 लोकसंख्येसाठी)</td></tr><td> समुदाय आरोग्य कार्यक्रम</td><td> लसीकरण मोहिमा, मातृ-शिशु आरोग्य सेवा</td></tr><td> मोबाइल/आउटरीच सेवा</td><td> नियमित आरोग्य शिबिरे व तपासण्या</td></tr></tbody> </table><br/>टीप: PHC आणि उपकेंद्रामध्ये बाह्य रुग्ण उपचार, प्रतिबंधात्मक काळजी, लहान शस्त्रक्रिया, आरोग्य जागरूकता कार्यक्रम आणि आवश्यकतेनुसार जिल्हा रुग्णालयात संदर्भ सेवा दिली जाते.
health_department.para4 = प्रमुख आरोग्य कार्यक्रम 
health_department.para5 = देऊळगाव गाडा ग्रामपंचायत राज्य व राष्ट्रीय आरोग्य कार्यक्रमांत सक्रिय सहभाग घेते:
health_department.para6 = <ol><li> राष्ट्रीय ग्रामीण आरोग्य अभियान (NRHM) – ग्रामीण आरोग्य सुविधा सुधारणा </li><li> जननी सुरक्षा योजना (JSY) – संस्थागत प्रसूतीला प्रोत्साहन </li><li> राष्ट्रीय लसीकरण कार्यक्रम – बालक व गर्भवती महिलांसाठी लसीकरण </li><li> राष्ट्रीय क्षयरोग नियंत्रण कार्यक्रम – क्षयरोग प्रतिबंध व उपचार </li><li> राष्ट्रीय कुष्ठरोग निर्मूलन कार्यक्रम – कुष्ठरोगाचे निदान व उपचार </li><li> राष्ट्रीय किटकजन्य रोग नियंत्रण कार्यक्रम – डेंग्यू, मलेरिया इ. रोगांवर नियंत्रण </li><li> राष्ट्रीय आयोडिन कमतरता विकार नियंत्रण कार्यक्रम – गळगंड प्रतिबंध </li><li> राष्ट्रीय एड्स नियंत्रण कार्यक्रम – HIV/AIDS जागरूकता, तपासणी व सल्ला </li><li> शाळा आरोग्य कार्यक्रम – विद्यार्थ्यांची नियमित आरोग्य तपासणी </li></ol>
