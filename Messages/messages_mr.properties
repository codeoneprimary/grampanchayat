current_schemes_text_card6 = महाराष्ट्रातील वृद्ध नागरिकांसाठी इंदिरा गांधी राष्ट्रीय वृद्धापकाळ निवृत्ती वेतन योजना आणि श्रावणबाळ सेवा राज्य निवृत्ती वेतन योजना या मुख्य सरकारी योजना आहेत. ६५ वर्षे किंवा त्याहून अधिक (काही बाबतीत ६०+) वय, दारिद्र्यरेषेखालील (BPL) स्थिती आणि महाराष्ट्र रहिवासी असणे आवश्यक आहे . याअंतर्गत दरमहा ₹६०० ते ₹१,५०० पर्यंत अर्थसहाय्य थेट बँक खात्यात (DBT) मिळते . <div class="table-container"><table class="custom-table"> <thead> <tr style="text-align: center;"> <th>पात्रता निकष  </th><th> आवश्यक कागदपत्रे  </th></tr> </thead><tbody> <tr style="vertical-align: top;"> <td> <ul><li>वय: अर्जदाराचे वय ६५ वर्षे किंवा त्याहून अधिक असावे .</li><li>उत्पन्न: दारिद्र्यरेषेखालील (BPL) यादीतील नागरिक असावेत. </li><li>रहिवासी: महाराष्ट्र राज्याचा रहिवासी असावा. </li><li>कौटुंबिक स्थिती: कुटुंबात कमावता सदस्य नसावा किंवा पतीने पत्नीला सोडून दिलेले असावे (महिलांसाठी). </li><li>श्रावणबाळ योजना: ज्यांचे वार्षिक उत्पन्न ₹२१,००० पेक्षा कमी आहे, तेही पात्र आहेत.</li></ul></td><td><ul><li>अर्ज: विहित नमुन्यातील अर्ज .</li><li>आधार कार्ड: (ओळख पुरावा). </li><li>वय पुरावा: जन्म प्रमाणपत्र, शाळा सोडल्याचे प्रमाणपत्र किंवा वयाचा पुरावा (तहसीलदार प्रमाणित). </li><li>रहिवासी पुरावा: आधार कार्ड, मतदान कार्ड, किंवा शिधापत्रिका (Ration Card).</li><li>BPL प्रमाणपत्र: दारिद्र्य रेषेखालील असल्याचे प्रमाणपत्र.</li><li>बँक खाते: बँक पासबुकची छायांकित प्रत (बँक खाते आधारशी लिंक असावे).</li><li>पासपोर्ट आकाराचे छायाचित्र .</li><li>उत्पन्नाचा दाखला: तहसीलदार यांचा वार्षिक उत्पन्नाचा दाखला (आवश्यक असल्यास).</li></ul></td></tr></tbody> </table></div>

