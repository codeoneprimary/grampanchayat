health_department.staff = Staff

health_department.introduction = Deulgaon Gada Gram Panchayat – Health Profile
health_department.para1 = Overview of Health Services. </br>Deulgaon Gada Gram Panchayat ensures the delivery of basic and preventive health services to its residents. The Gram Panchayat coordinates with the Public Health Department to provide the following services:
health_department.para2 = <ul><li> Primary healthcare facilities through Primary Health Centers (PHCs) and Sub-Centers </li><li> Immunization and maternal-child health programs </li><li> Disease prevention and health awareness campaigns </li><li> Health monitoring of school children and senior citizens </li></ul> 
health_department.para3 = <b>Health Infrastructure</b><table> <thead> <tr> <th>Facility Type</th> <th>Number in Gram Panchayat / Nearby Area</th> </tr> </thead> <tbody> <tr> <td>Primary Health Centre (PHC)</td> <td>1 (for approximately 30,000 population)</td> </tr> <tr> <td>Health Sub-Centre</td> <td>1 (for approximately 5,000 population)</td> </tr> <tr> <td>Community Health Programs</td> <td>Immunization drives, maternal and child health services</td> </tr> <tr> <td>Mobile / Outreach Services</td> <td>Regular health camps and medical check-ups</td> </tr> </tbody> </table><br/>Note: PHC and sub-center services include outpatient treatment, preventive care, minor procedures, health awareness programs, and referral to district hospitals if required.
health_department.para4 = Key Health Programs Implemented
health_department.para5 = Deulgaon Gada Gram Panchayat actively participates in state and national health programs: 
health_department.para6 = <ol><li> National Rural Health Mission (NRHM) – Strengthening rural healthcare infrastructure </li><li> Janani Suraksha Yojana (JSY) – Promoting institutional deliveries </li><li> National Immunization Program – Ensuring vaccination for children and pregnant women </li><li> National Tuberculosis Control Program (NTP) – TB prevention and treatment </li><li> Leprosy Eradication Program – Detection and treatment of leprosy cases </li><li> National Vector-Borne Disease Control Program – Dengue, malaria, and other mosquito-borne diseases </li><li> National Iodine Deficiency Disorders Control Program – Preventing goiter and related disorders </li><li> National AIDS Control Program – HIV/AIDS awareness, testing, and counseling </li><li> School Health Programs – Periodic health check-ups for students  </li></ol>
health_department.para7 = <b>Maternal and Child Health</b><br/>Deulgaon Gada Gram Panchayat ensures:
health_department.para8 = <ul><li> Regular prenatal and postnatal care for mothers </li><li> Institutional deliveries and safe home delivery support </li><li> Immunization and growth monitoring for children under 5 years </li><li> Nutritional supplements and anemia prevention programs </li></ul>
health_department.para9 = Sanitation and Hygiene Initiatives
health_department.para10 = <ul><li> Promotes safe drinking water through household connections or public taps </li><li> Public sanitation awareness campaigns under Swachh Bharat Mission </li><li> Solid waste management and village cleanliness drives </li><li> Encourages proper drainage, toilets, and hygiene education </li></ul>
health_department.para11 = Public Health Monitoring
health_department.para12 = <ul><li> Health records and patient data maintained at the PHC and sub-center </li><li> Disease outbreak monitoring and preventive action during monsoon and epidemic seasons </li><li> Regular health awareness camps on common diseases like diarrhea, dengue, malaria, and seasonal infections </li></ul>
health_department.para13 = Collaboration
health_department.para14 = The Gram Panchayat collaborates with:
health_department.para15 = <ul><li> District Health Office, Pune </li><li> Zilla Parishad Health Department </li><li> NGOs for health awareness and vaccination drives </li><li> School Health Programs for child health monitoring </li></ul>
health_department.para16 = Conclusion
health_department.para17 = The Deulgaon Gada Gram Panchayat is committed to improving the health and well-being of its residents through:
health_department.para18 = <ul><li> Strengthened primary healthcare facilities </li><li> Effective implementation of national and state health programs Awareness campaigns and preventive measures </li><li> Promoting sanitation, hygiene, and environmental health </li></ul>
health_department.para19 =The Gram Panchayat works closely with the Public Health Department to ensure that all residents, especially women, children, elderly, and marginalized groups, have access to quality health services.

#About us page
aboutus.details = According to Census 2011, the location code or village code of Deulgaon Gada is 556382. The village spans a total geographical area of 2470 hectares, and the pincode of the locality is 412203. Daund is nearest town to Deulgaon Gada village for all major economic activities, which is approximately 30km away
